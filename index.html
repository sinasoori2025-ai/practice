<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/style.css">
<title>سامانه ورود دانش‌آموزان</title>



</head>
<body>

<div class="card">

    <div class="left">
        <h2>سامانه مدرسه</h2>
        <p>
            به سامانه دانش‌آموزان خوش آمدید.
            لطفاً برای ورود، اطلاعات خود را وارد کنید.
        </p>
    </div>

    <div class="right">

        <form id="form">

            <h2>ورود</h2>

            <input id="name" type="text" placeholder="نام">

            <input id="phone" type="tel" placeholder="شماره تلفن">

            <button type="submit">ورود به سامانه</button>

        </form>

    </div>

</div>

<script src="../js/main.js"></script>

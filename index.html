<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">

    <title>California Horizon Academy | Student Portal</title>
</head>

<body>

<div class="card">

    <!-- School Information -->
    <div class="left">

        <h2>California Horizon Academy</h2>

        <p>
            Welcome to our Student Portal.
            Access your classes, assignments, grades,
            and school updates from anywhere.
        </p>

        <img 
        src="assets/images/school.jpg" 
        class="left-img"
        alt="California School">

    </div>


    <!-- Login -->
    <div class="right">

        <form id="form">

            <h2>Student Login</h2>

            <input 
            id="name"
            type="text"
            placeholder="Student Full Name">


            <input 
            id="phone"
            type="tel"
            placeholder="Phone Number">


            <input 
            id="email"
            type="email"
            placeholder="Student Email Address">


            <button type="submit">
                Sign In
            </button>

        </form>

    </div>

</div>


<script type="module" src="js/main.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Florida Horizon Academy</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            font-family: Arial, sans-serif;
        }
        .card {
            background: white; border-radius: 20px; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 1000px; width: 90%; display: flex;
        }
        .left { background: linear-gradient(135deg, #2563eb, #1e40af); color: white; padding: 3rem; flex: 1; }
        .right { padding: 3rem; flex: 1; }
        input { width: 100%; padding: 14px; margin: 12px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; }
        button { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 10px; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>
<div class="card">
    <div class="left">
        <h2>Florida Horizon Academy</h2>
        <p>Welcome to our Student Portal.<br>Access classes, assignments, and grades from anywhere.</p>
    </div>
    <div class="right">
        <form method="POST" action="login.php">
            <h2>Student Login</h2>
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <input type="email" name="email" placeholder="Student Email" required>
            <button type="submit">Sign In</button>
            <p style="text-align:center; margin-top:15px;">Don't have an account? <a href="register.html">Register</a></p>
        </form>
    </div>
</div>
</body>
</html>
